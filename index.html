<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet">
    <title>Online shopping site for mobile, electronic, furniture, Grocery, ...</title>
    <link rel="icon" href="./media/icon.png" type="image/png">
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <!-- top bar It will stay on top always -->
    <div id="top_bar">
        <!-- division for logo of flipkart -->
        <img src="./media/logo_flipkart.png" id="logo" />
        <!-- division for search bar  -->
        <div id="searchbar">
            <input type="text" placeholder="Search for products, brands and more"> 
            <span class="material-icons">
                search
            </span>
        </div>
        <!-- login button -->
        <button>Login</button>
        <!-- drop down menu div  -->
        <div id="drop">
            <div class="more">
                <span>More</span>
                <span class="material-icons">
                    arrow_drop_down
                </span>
                
            </div>
            <!-- only displayed when cusrsor is on more div -->
            <div class="more_cont">
                <ul>
                    <li>Sell on flipkart</li>
                    <li>Download app</li>
                    <li>24*7 Support</li>
                </ul>
            </div>
        </div>
    </div>    
    <!-- nav bar it is scrollable-->
    <div id="nav-bar">
        <span>Electronic</span>
        <span>Tv & Appliance</span>
        <span>Men</span>
        <span>Women</span>
        <span>Baby & Kids</span>
        <span>Sports </span>
        <span>Flights</span>
    </div>
    <!-- banner to contain image -->
    <div id="banner">
        <img src="./media/banner-bg.png" />
    </div>
    <div id="deals">
        <span>Deals of the Day</span>
        <div id="deals-content">
            <img src="./media/headphone.png" />
            <img src="./media/mobile.png" />
            <img src="./media/dryer.jpg" />
            <img src="./media/dress.jpg" />
            <img src="./media/child.jpg" />
        </div>
    </div>
</body>
</html>
